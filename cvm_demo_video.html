<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVM++ Demo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --panel: #0d1117;
  --border: #1a2030;
  --border2: #242d3d;
  --accent: #00e5ff;
  --green: #39d353;
  --purple: #a78bfa;
  --orange: #fbbf24;
  --red: #f87171;
  --pink: #f472b6;
  --text: #cdd6f4;
  --muted: #4a5568;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }

/* ── SCANLINE overlay ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
  pointer-events:none; z-index:9999;
}

/* ── MAIN LAYOUT ── */
#app {
  display: grid;
  grid-template-rows: 52px 1fr 48px;
  grid-template-columns: 260px 1fr 280px;
  height: 100vh;
  gap: 0;
}

/* ── TITLE BAR ── */
#titlebar {
  grid-column: 1 / -1;
  background: #050709;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
}
.tb-dots { display:flex; gap:7px; }
.tb-dot { width:12px;height:12px;border-radius:50%; }
.tb-dot:nth-child(1){background:#ff5f57;}
.tb-dot:nth-child(2){background:#febc2e;}
.tb-dot:nth-child(3){background:#28c840;}
.tb-title {
  font-family: var(--mono); font-size:12px; color: var(--muted);
  flex:1; text-align:center; letter-spacing:.05em;
}
#speed-wrap { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; color:var(--muted); }
#speed-wrap input { width:80px; accent-color: var(--accent); }

/* ── LEFT: source + pipeline ── */
#left {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.pane-header {
  background: #0a0e14;
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  font-family: var(--mono); font-size:10px; color: var(--muted);
  text-transform: uppercase; letter-spacing:.1em;
  display:flex; align-items:center; justify-content:space-between;
}
.pane-header .lang-badge {
  background: rgba(0,229,255,.1); color: var(--accent);
  border: 1px solid rgba(0,229,255,.2);
  border-radius:4px; padding:1px 6px; font-size:9px;
}

/* SOURCE CODE */
#source-pane {
  padding: 14px;
  flex: 1;
  overflow-y: auto;
  font-family: var(--mono); font-size:12.5px; line-height:1.75;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}
.src-line { display:flex; gap:12px; }
.src-ln { color: var(--muted); min-width:18px; text-align:right; user-select:none; font-size:11px; padding-top:1px; }
.src-code { color: var(--text); }
.src-line.hl { background: rgba(0,229,255,.06); border-left:2px solid var(--accent); margin-left:-14px; padding-left:12px; border-radius:2px; }
.src-line.running { background: rgba(57,211,83,.07); border-left:2px solid var(--green); margin-left:-14px; padding-left:12px; }

/* syntax colors */
.kw { color: #ff79c6; }
.num { color: #bd93f9; }
.op  { color: var(--accent); }
.id  { color: #50fa7b; }
.cm  { color: var(--muted); font-style:italic; }
.bool{ color: var(--orange); }

/* PIPELINE */
#pipeline {
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  display:flex; flex-direction:column; gap:5px;
}
.pipe-row {
  display:flex; align-items:center; gap:8px;
  font-family:var(--mono); font-size:10px; color: var(--muted);
  padding: 5px 8px; border-radius:5px;
  transition: all .3s;
}
.pipe-row.active  { background: rgba(0,229,255,.07); color: var(--accent); }
.pipe-row.done    { color: var(--green); }
.pipe-row.pending { color: var(--border2); }
.pipe-icon { width:16px; text-align:center; font-size:13px; }
.pipe-bar {
  flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden;
}
.pipe-fill {
  height:100%; background: var(--accent); width:0%; border-radius:2px;
  transition: width .4s ease;
  box-shadow: 0 0 6px var(--accent);
}
.pipe-row.done .pipe-fill   { width:100%; background: var(--green); box-shadow: 0 0 6px var(--green); }
.pipe-row.active .pipe-fill { animation: fillPipe .8s ease forwards; }
@keyframes fillPipe { from{width:0%} to{width:100%} }

/* ── CENTER: terminal ── */
#center { display:flex; flex-direction:column; overflow:hidden; }

.tab-row {
  display:flex; background:#0a0e14; border-bottom:1px solid var(--border);
  padding: 0 12px; gap:2px;
}
.tab-btn {
  font-family:var(--mono); font-size:10px; padding:9px 14px;
  cursor:pointer; border:none; background:none; color:var(--muted);
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition: color .15s, border-color .15s;
  text-transform: uppercase; letter-spacing:.06em;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

#terminal {
  flex:1; padding:14px 18px; overflow-y:auto;
  font-family:var(--mono); font-size:12px; line-height:1.8;
  scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
}
.term-line { opacity:0; transform:translateY(4px); transition: opacity .2s ease, transform .2s ease; }
.term-line.vis { opacity:1; transform:none; }
.term-prompt { color: var(--accent); }
.term-cmd    { color: var(--text); }
.term-section{ color: var(--orange); font-weight:700; margin-top:8px; }
.term-token  { color: #79c0ff; }
.term-type   { color: var(--purple); }
.term-lexeme { color: var(--orange); }
.term-ast    { color: var(--green); }
.term-ast-child { color: #7ee787; }
.term-node   { color: var(--pink); }
.term-op     { color: var(--accent); font-weight:600; }
.term-addr   { color: var(--muted); }
.term-val    { color: var(--purple); }
.term-stack  { color: #64748b; }
.term-output { color: var(--green); font-weight:700; font-size:14px; }
.term-err    { color: var(--red); }
.cursor-blink { display:inline-block; width:7px; height:13px; background:var(--accent); vertical-align:middle; animation:blink .8s step-start infinite; margin-left:2px; }
@keyframes blink { 50%{opacity:0} }

/* ── RIGHT: VM state ── */
#right {
  border-left: 1px solid var(--border);
  display:flex; flex-direction:column; gap:0;
  overflow:hidden;
}
#stack-pane, #globals-pane, #ip-pane {
  border-bottom: 1px solid var(--border);
}
#stack-pane { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
#globals-pane { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
#ip-pane { padding:10px 14px; }

.vm-slots { flex:1; padding:8px 14px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }

.slot {
  display:flex; justify-content:space-between; align-items:center;
  padding:4px 8px; border-radius:4px; margin-bottom:3px;
  font-family:var(--mono); font-size:11px;
  background: var(--border); transition: all .25s;
}
.slot.new   { background: rgba(0,229,255,.12); border:1px solid rgba(0,229,255,.3); animation: popIn .25s ease; }
.slot.top   { background: rgba(57,211,83,.1); border:1px solid rgba(57,211,83,.3); }
.slot-idx   { color:var(--muted); font-size:10px; }
.slot-val   { color:var(--text); font-weight:600; }
.slot-type  { color:var(--muted); font-size:10px; font-style:italic; }
@keyframes popIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }

.var-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:4px 8px; border-radius:4px; margin-bottom:3px;
  font-family:var(--mono); font-size:11px;
  background: var(--border); transition: background .3s;
}
.var-row.updated { background: rgba(167,139,250,.15); border:1px solid rgba(167,139,250,.3); animation: popIn .25s; }
.var-name { color:var(--green); }
.var-val  { color:var(--purple); font-weight:600; }

.ip-row { display:flex; justify-content:space-between; align-items:center; font-family:var(--mono); font-size:11px; }
.ip-lbl { color:var(--muted); }
.ip-val { color:var(--accent); font-weight:700; font-size:13px; }
#current-op { color:var(--orange); font-size:10px; margin-top:4px; font-family:var(--mono); }

/* ── STATUS BAR ── */
#statusbar {
  grid-column:1/-1;
  background:#050709; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:20px; padding:0 18px;
  font-family:var(--mono); font-size:10px; color:var(--muted);
}
.sb-item { display:flex; align-items:center; gap:5px; }
.sb-dot  { width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green); }
.sb-dot.idle { background:var(--muted); box-shadow:none; }
#sb-status { color:var(--text); }
#sb-prog { flex:1; }
.progress-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill  { height:100%; background:linear-gradient(90deg,var(--purple),var(--accent)); border-radius:2px; width:0%; transition:width .4s ease; box-shadow:0 0 8px var(--accent); }

/* program selector */
#prog-select {
  background:var(--panel); border:1px solid var(--border2); color:var(--text);
  font-family:var(--mono); font-size:10px; padding:3px 8px; border-radius:4px;
  cursor:pointer; outline:none;
}
#run-btn {
  background:linear-gradient(135deg,#0ea5e9,var(--accent));
  color:#000; border:none; border-radius:5px;
  font-family:var(--mono); font-size:10px; font-weight:700;
  padding:4px 14px; cursor:pointer; text-transform:uppercase; letter-spacing:.06em;
  transition: opacity .2s; box-shadow:0 0 12px rgba(0,229,255,.3);
}
#run-btn:hover { opacity:.85; }
#run-btn:disabled { opacity:.4; cursor:not-allowed; }
</style>
</head>
<body>
<div id="app">

<!-- TITLE BAR -->
<div id="titlebar">
  <div class="tb-dots"><div class="tb-dot"></div><div class="tb-dot"></div><div class="tb-dot"></div></div>
  <div class="tb-title">CVM++ — Bytecode Compiler &amp; Virtual Machine</div>
  <div id="speed-wrap">
    speed <input type="range" id="speed" min="1" max="5" value="3">
    <select id="prog-select">
      <option value="calc">calculator.cvm</option>
      <option value="truth">truth_machine.cvm</option>
    </select>
    <button id="run-btn">▶ Run</button>
  </div>
</div>

<!-- LEFT -->
<div id="left">
  <div class="pane-header">source <span class="lang-badge">CVM++</span></div>
  <div id="source-pane"></div>
  <div id="pipeline">
    <div class="pane-header" style="border:none;padding:0 0 8px 0">pipeline</div>
    <div class="pipe-row pending" id="pipe-lex"><span class="pipe-icon">⬡</span>Lexer<div class="pipe-bar"><div class="pipe-fill"></div></div></div>
    <div class="pipe-row pending" id="pipe-parse"><span class="pipe-icon">⬡</span>Parser<div class="pipe-bar"><div class="pipe-fill"></div></div></div>
    <div class="pipe-row pending" id="pipe-compile"><span class="pipe-icon">⬡</span>Compiler<div class="pipe-bar"><div class="pipe-fill"></div></div></div>
    <div class="pipe-row pending" id="pipe-vm"><span class="pipe-icon">⬡</span>VM<div class="pipe-bar"><div class="pipe-fill"></div></div></div>
  </div>
</div>

<!-- CENTER -->
<div id="center">
  <div class="tab-row">
    <button class="tab-btn active" id="tab-tokens"  onclick="setTab('tokens')">Tokens</button>
    <button class="tab-btn"        id="tab-ast"     onclick="setTab('ast')">AST</button>
    <button class="tab-btn"        id="tab-disasm"  onclick="setTab('disasm')">Bytecode</button>
    <button class="tab-btn"        id="tab-trace"   onclick="setTab('trace')">VM Trace</button>
    <button class="tab-btn"        id="tab-output"  onclick="setTab('output')">Output</button>
  </div>
  <div id="terminal"></div>
</div>

<!-- RIGHT: VM STATE -->
<div id="right">
  <div id="stack-pane">
    <div class="pane-header">operand stack</div>
    <div class="vm-slots" id="stack-slots"></div>
  </div>
  <div id="globals-pane">
    <div class="pane-header">globals</div>
    <div class="vm-slots" id="global-slots"></div>
  </div>
  <div id="ip-pane">
    <div class="pane-header" style="border:none;padding:0 0 8px 0">registers</div>
    <div class="ip-row"><span class="ip-lbl">IP</span><span class="ip-val" id="ip-val">0x0000</span></div>
    <div id="current-op">—</div>
  </div>
</div>

<!-- STATUS -->
<div id="statusbar">
  <div class="sb-item"><div class="sb-dot idle" id="sb-dot"></div><span id="sb-status">ready</span></div>
  <div class="sb-item sb-prog">
    <div class="progress-track" style="flex:1"><div class="progress-fill" id="sb-prog"></div></div>
  </div>
  <div class="sb-item" id="sb-right">CVM++ v0.1 · stack-based VM · C++20</div>
</div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
const PROGRAMS = {
  calc: {
    name: 'calculator.cvm',
    lines: [
      { n:1,  html:`<span class="kw">let</span> <span class="id">a</span> <span class="op">=</span> <span class="num">15</span>;` },
      { n:2,  html:`<span class="kw">let</span> <span class="id">b</span> <span class="op">=</span> <span class="num">4</span>;` },
      { n:3,  html:`` },
      { n:4,  html:`<span class="kw">print</span> <span class="id">a</span> <span class="op">+</span> <span class="id">b</span>;` },
      { n:5,  html:`<span class="kw">print</span> <span class="id">a</span> <span class="op">-</span> <span class="id">b</span>;` },
      { n:6,  html:`<span class="kw">print</span> <span class="id">a</span> <span class="op">*</span> <span class="id">b</span>;` },
      { n:7,  html:`<span class="kw">print</span> <span class="id">a</span> <span class="op">/</span> <span class="id">b</span>;` },
      { n:8,  html:`` },
      { n:9,  html:`<span class="kw">let</span> <span class="id">big</span> <span class="op">=</span> <span class="id">a</span> <span class="op">&gt;</span> <span class="id">b</span>;` },
      { n:10, html:`<span class="kw">print</span> <span class="id">big</span>;` },
      { n:11, html:`` },
      { n:12, html:`<span class="kw">let</span> <span class="id">sum</span> <span class="op">=</span> <span class="id">a</span> <span class="op">+</span> <span class="id">b</span>;` },
      { n:13, html:`<span class="kw">if</span> <span class="id">sum</span> <span class="op">&gt;</span> <span class="num">10</span> {` },
      { n:14, html:`&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">print</span> <span class="id">sum</span>;` },
      { n:15, html:`} <span class="kw">else</span> {` },
      { n:16, html:`&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">print</span> <span class="num">0</span>;` },
      { n:17, html:`}` },
    ],
    tokens: [
      ['1,0','LET',"'let'"], ['1,4','IDENTIFIER',"'a'"], ['1,6','EQUAL',"'='"],
      ['1,8','NUMBER',"'15'"], ['1,10','SEMICOLON',"';'"],
      ['2,0','LET',"'let'"], ['2,4','IDENTIFIER',"'b'"], ['2,6','EQUAL',"'='"],
      ['2,8','NUMBER',"'4'"],
      ['4,0','PRINT',"'print'"], ['4,6','IDENTIFIER',"'a'"], ['4,8','PLUS',"'+'"], ['4,10','IDENTIFIER',"'b'"],
      ['5,0','PRINT',"'print'"], ['5,6','IDENTIFIER',"'a'"], ['5,8','MINUS',"'-'"], ['5,10','IDENTIFIER',"'b'"],
      ['6,0','PRINT',"'print'"], ['6,6','IDENTIFIER',"'a'"], ['6,8','STAR',"'*'"], ['6,10','IDENTIFIER',"'b'"],
      ['7,0','PRINT',"'print'"], ['7,6','IDENTIFIER',"'a'"], ['7,8','SLASH',"'/'"], ['7,10','IDENTIFIER',"'b'"],
      ['9,0','LET',"'let'"], ['9,4','IDENTIFIER',"'big'"], ['9,8','EQUAL',"'='"], ['9,10','IDENTIFIER',"'a'"], ['9,12','GREATER',"'>'"], ['9,14','IDENTIFIER',"'b'"],
      ['10,0','PRINT',"'print'"], ['10,6','IDENTIFIER',"'big'"],
      ['12,0','LET',"'let'"], ['12,4','IDENTIFIER',"'sum'"], ['12,8','EQUAL',"'='"],
      ['13,0','IF',"'if'"], ['13,3','IDENTIFIER',"'sum'"], ['13,7','GREATER',"'>'"], ['13,9','NUMBER',"'10'"],
      ['14,4','PRINT',"'print'"], ['14,10','IDENTIFIER',"'sum'"],
      ['15,2','ELSE',"'else'"],
      ['16,4','PRINT',"'print'"], ['16,10','NUMBER',"'0'"],
    ],
    ast: [
      'VarDecl -> a', '  Number(15)',
      'VarDecl -> b', '  Number(4)',
      'PrintStmt', '  Binary(+)', '    Variable(a)', '    Variable(b)',
      'PrintStmt', '  Binary(-)', '    Variable(a)', '    Variable(b)',
      'PrintStmt', '  Binary(*)', '    Variable(a)', '    Variable(b)',
      'PrintStmt', '  Binary(/)', '    Variable(a)', '    Variable(b)',
      'VarDecl -> big', '  Binary(>)', '    Variable(a)', '    Variable(b)',
      'PrintStmt', '  Variable(big)',
      'VarDecl -> sum', '  Binary(+)', '    Variable(a)', '    Variable(b)',
      'IfStmt', '  condition:', '    Binary(>)', '      Variable(sum)', '      Number(10)',
      '  then:', '    Block', '      PrintStmt', '        Variable(sum)',
      '  else:', '    Block', '      PrintStmt', '        Number(0)',
    ],
    disasm: [
      {addr:'0000',ln:1, op:'OP_CONSTANT',   arg:"idx=0  value=15"},
      {addr:'0002',ln:1, op:'OP_DEFINE_GLOBAL', arg:"name='a'"},
      {addr:'0004',ln:2, op:'OP_CONSTANT',   arg:"idx=1  value=4"},
      {addr:'0006',ln:2, op:'OP_DEFINE_GLOBAL', arg:"name='b'"},
      {addr:'0008',ln:4, op:'OP_GET_GLOBAL', arg:"name='a'"},
      {addr:'0010',ln:4, op:'OP_GET_GLOBAL', arg:"name='b'"},
      {addr:'0012',ln:4, op:'OP_ADD',        arg:""},
      {addr:'0013',ln:4, op:'OP_PRINT',      arg:""},
      {addr:'0014',ln:5, op:'OP_GET_GLOBAL', arg:"name='a'"},
      {addr:'0016',ln:5, op:'OP_GET_GLOBAL', arg:"name='b'"},
      {addr:'0018',ln:5, op:'OP_SUB',        arg:""},
      {addr:'0019',ln:5, op:'OP_PRINT',      arg:""},
      {addr:'0020',ln:6, op:'OP_GET_GLOBAL', arg:"name='a'"},
      {addr:'0022',ln:6, op:'OP_GET_GLOBAL', arg:"name='b'"},
      {addr:'0024',ln:6, op:'OP_MUL',        arg:""},
      {addr:'0025',ln:6, op:'OP_PRINT',      arg:""},
      {addr:'0026',ln:7, op:'OP_GET_GLOBAL', arg:"name='a'"},
      {addr:'0028',ln:7, op:'OP_GET_GLOBAL', arg:"name='b'"},
      {addr:'0030',ln:7, op:'OP_DIV',        arg:""},
      {addr:'0031',ln:7, op:'OP_PRINT',      arg:""},
      {addr:'0032',ln:9, op:'OP_GET_GLOBAL', arg:"name='a'"},
      {addr:'0034',ln:9, op:'OP_GET_GLOBAL', arg:"name='b'"},
      {addr:'0036',ln:9, op:'OP_GREATER',    arg:""},
      {addr:'0037',ln:9, op:'OP_DEFINE_GLOBAL', arg:"name='big'"},
      {addr:'0039',ln:10,op:'OP_GET_GLOBAL', arg:"name='big'"},
      {addr:'0041',ln:10,op:'OP_PRINT',      arg:""},
      {addr:'0042',ln:12,op:'OP_GET_GLOBAL', arg:"name='a'"},
      {addr:'0044',ln:12,op:'OP_GET_GLOBAL', arg:"name='b'"},
      {addr:'0046',ln:12,op:'OP_ADD',        arg:""},
      {addr:'0047',ln:12,op:'OP_DEFINE_GLOBAL', arg:"name='sum'"},
      {addr:'0049',ln:13,op:'OP_GET_GLOBAL', arg:"name='sum'"},
      {addr:'0051',ln:13,op:'OP_CONSTANT',   arg:"idx=2  value=10"},
      {addr:'0053',ln:13,op:'OP_GREATER',    arg:""},
      {addr:'0054',ln:13,op:'OP_JUMP_IF_FALSE', arg:"offset=7 -> 64"},
      {addr:'0057',ln:13,op:'OP_POP',        arg:""},
      {addr:'0058',ln:14,op:'OP_GET_GLOBAL', arg:"name='sum'"},
      {addr:'0060',ln:14,op:'OP_PRINT',      arg:""},
      {addr:'0061',ln:13,op:'OP_JUMP',       arg:"offset=4 -> 68"},
      {addr:'0064',ln:13,op:'OP_POP',        arg:""},
      {addr:'0065',ln:16,op:'OP_CONSTANT',   arg:"idx=3  value=0"},
      {addr:'0067',ln:16,op:'OP_PRINT',      arg:""},
      {addr:'0068',ln:0, op:'OP_RETURN',     arg:""},
    ],
    // each step: {ip, op, stackBefore, stackAfter, globals, srcLine, output?}
    trace: [
      {ip:'0x0000',op:'OP_CONSTANT',   sb:[],          sa:[{v:'15',t:'num'}],         g:{},                       src:1},

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let currentTab = 'tokens';
let running = false;
let abortCtrl = null;
let prog = PROGRAMS.calc;

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const term = $('terminal');

function speedMs() {
  const v = parseInt($('speed').value);
  return [1200, 700, 380, 200, 80][v - 1];
}

function sleep(ms) {
  return new Promise(r => {
    const t = setTimeout(r, ms);
    if (abortCtrl) abortCtrl.timeouts.push(t);
  });
}

function setTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('tab-' + name).classList.add('active');
}

function clearTerm() { term.innerHTML = ''; }

function appendLine(html, cls = '') {
  const d = document.createElement('div');
  d.className = 'term-line' + (cls ? ' ' + cls : '');
  d.innerHTML = html;
  term.appendChild(d);
  requestAnimationFrame(() => d.classList.add('vis'));
  term.scrollTop = term.scrollHeight;
  return d;
}

function setPipe(id, state) {
  const el = $('pipe-' + id);
  el.className = 'pipe-row ' + state;
  el.querySelector('.pipe-icon').textContent = state === 'done' ? '✓' : state === 'active' ? '◈' : '⬡';
}

function setProgress(pct) {
  $('sb-prog').style.width = pct + '%';
}

function setSbStatus(txt, active = true) {
  $('sb-status').textContent = txt;
  $('sb-dot').className = 'sb-dot' + (active ? '' : ' idle');
}

function highlightSrc(line) {
  document.querySelectorAll('.src-line').forEach(el => el.classList.remove('hl', 'running'));
  if (line) {
    const el = document.querySelector(`.src-line[data-line="${line}"]`);
    if (el) el.classList.add('running');
  }
}

function renderStack(slots) {
  const container = $('stack-slots');
  container.innerHTML = '';
  if (!slots.length) {
    container.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px;text-align:center">[ empty ]</div>';
    return;
  }
  slots.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slot' + (i === slots.length - 1 ? ' top' : '');
    const col = s.t === 'bool' ? 'var(--orange)' : s.t === 'num' ? 'var(--purple)' : 'var(--text)';
    d.innerHTML = `<span class="slot-idx">[${i}]</span><span class="slot-val" style="color:${col}">${s.v}</span><span class="slot-type">${s.t}</span>`;
    container.appendChild(d);
  });
}

function renderGlobals(g) {
  const container = $('global-slots');
  container.innerHTML = '';
  const keys = Object.keys(g);
  if (!keys.length) {
    container.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px;text-align:center">{ }</div>';
    return;
  }
  keys.forEach(k => {
    const d = document.createElement('div');
    d.className = 'var-row';
    const col = g[k] === 'true' || g[k] === 'false' ? 'var(--orange)' : 'var(--purple)';
    d.innerHTML = `<span class="var-name">${k}</span><span class="var-val" style="color:${col}">${g[k]}</span>`;
    container.appendChild(d);
  });
}

function setIP(addr, op) {
  $('ip-val').textContent = addr;
  $('current-op').textContent = op || '—';
}

function resetVM() {
  renderStack([]);
  renderGlobals({});
  setIP('0x0000', '—');
}

function resetPipes() {
  ['lex','parse','compile','vm'].forEach(p => setPipe(p, 'pending'));
  setProgress(0);
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER SOURCE
// ─────────────────────────────────────────────────────────────────────────────
function renderSource() {
  const sp = $('source-pane');
  sp.innerHTML = '';
  prog.lines.forEach(ln => {
    const d = document.createElement('div');
    d.className = 'src-line';
    d.dataset.line = ln.n;
    d.innerHTML = `<span class="src-ln">${ln.n}</span><span class="src-code">${ln.html || ''}</span>`;
    sp.appendChild(d);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// OPCODE COLOR
// ─────────────────────────────────────────────────────────────────────────────
function opColor(op) {
  if (op.includes('CONSTANT') || op === 'OP_TRUE' || op === 'OP_FALSE' || op === 'OP_NIL') return '#79c0ff';
  if (op.includes('DEFINE') || op.includes('GET') || op.includes('SET')) return '#7ee787';
  if (['OP_ADD','OP_SUB','OP_MUL','OP_DIV','OP_NEGATE','OP_POP'].includes(op)) return '#d2a8ff';
  if (['OP_LESS','OP_GREATER','OP_EQUAL','OP_NOT_EQUAL','OP_LESS_EQUAL','OP_GREATER_EQUAL'].includes(op)) return '#ffa657';
  if (op.includes('JUMP') || op === 'OP_LOOP') return '#ff7b72';
  if (op === 'OP_PRINT') return '#e3b341';
  if (op === 'OP_RETURN') return '#f78166';
  return 'var(--text)';
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN DEMO SEQUENCE
// ─────────────────────────────────────────────────────────────────────────────
async function runDemo() {
  if (running) return;
  running = true;
  abortCtrl = { timeouts: [] };
  $('run-btn').disabled = true;

  const ms = () => speedMs();
  resetVM();
  resetPipes();
  renderSource();
  highlightSrc(null);

  // ── PHASE 1: LEXING ──
  setTab('tokens'); setTab('tokens');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('tab-tokens').classList.add('active');
  clearTerm();
  setSbStatus('lexing…');
  setPipe('lex', 'active');
  setProgress(5);

  appendLine(`<span class="term-prompt">$</span> <span class="term-cmd">./cvm --tokens ${prog.name}</span>`);
  await sleep(ms() * 0.6);
  appendLine(`<span class="term-section">── TOKEN STREAM ─────────────────────</span>`);
  await sleep(ms() * 0.3);

  for (let i = 0; i < prog.tokens.length; i++) {
    const [loc, type, lex] = prog.tokens[i];
    appendLine(`  <span class="term-addr">[${loc}]</span>  <span class="term-type">${type.padEnd(14)}</span>  <span class="term-lexeme">${lex}</span>`);
    setProgress(5 + (i / prog.tokens.length) * 18);
    await sleep(ms() * 0.18);
    if (!running) return;
  }

  setPipe('lex', 'done');
  await sleep(ms() * 0.5);

  // ── PHASE 2: PARSING / AST ──
  setTab('ast');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('tab-ast').classList.add('active');
  clearTerm();
  setSbStatus('parsing…');
  setPipe('parse', 'active');
  setProgress(25);

  appendLine(`<span class="term-prompt">$</span> <span class="term-cmd">./cvm --ast ${prog.name}</span>`);
  await sleep(ms() * 0.6);
  appendLine(`<span class="term-section">── ABSTRACT SYNTAX TREE ─────────────</span>`);
  await sleep(ms() * 0.3);

  for (let i = 0; i < prog.ast.length; i++) {
    const line = prog.ast[i];
    const indent = line.match(/^(\s*)/)[1].length;
    let html;
    if (line.includes('VarDecl') || line.includes('WhileStmt') || line.includes('IfStmt') || line.includes('PrintStmt') || line.includes('ExprStmt'))
      html = `<span style="color:#ff79c6">${line}</span>`;
    else if (line.includes('Number(') || line.includes('Bool('))
      html = `<span style="color:#bd93f9">${line}</span>`;
    else if (line.includes('Variable(') || line.includes('Binary(') || line.includes('Assign'))
      html = `<span style="color:#50fa7b">${line}</span>`;
    else if (line.includes('Block') || line.includes('condition:') || line.includes('then:') || line.includes('else:') || line.includes('body:'))
      html = `<span style="color:var(--muted)">${line}</span>`;
    else
      html = `<span class="term-ast">${line}</span>`;
    appendLine(`  ${html}`);
    setProgress(25 + (i / prog.ast.length) * 15);
    await sleep(ms() * 0.15);
    if (!running) return;
  }

  setPipe('parse', 'done');
  await sleep(ms() * 0.5);

  // ── PHASE 3: BYTECODE ──
  setTab('disasm');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('tab-disasm').classList.add('active');
  clearTerm();
  setSbStatus('compiling to bytecode…');
  setPipe('compile', 'active');
  setProgress(42);

  appendLine(`<span class="term-prompt">$</span> <span class="term-cmd">./cvm --disasm ${prog.name}</span>`);
  await sleep(ms() * 0.6);
  appendLine(`<span class="term-section">── BYTECODE DISASSEMBLY ─────────────</span>`);
  appendLine(`<span class="term-addr">OFFSET  LINE  OPCODE                  OPERAND</span>`);
  appendLine(`<span class="term-addr">──────────────────────────────────────────────</span>`);
  await sleep(ms() * 0.3);

  for (let i = 0; i < prog.disasm.length; i++) {
    const d = prog.disasm[i];
    const col = opColor(d.op);
    appendLine(
      `  <span class="term-addr">${d.addr}</span>  ` +
      `<span style="color:var(--muted)">${String(d.ln).padEnd(4)}</span>  ` +
      `<span style="color:${col};font-weight:600">${d.op.padEnd(22)}</span>  ` +
      `<span style="color:var(--orange)">${d.arg}</span>`
    );
    setProgress(42 + (i / prog.disasm.length) * 18);
    await sleep(ms() * 0.12);
    if (!running) return;
  }

  setPipe('compile', 'done');
  setSbStatus('compilation complete ✓');
  await sleep(ms() * 0.7);

  // ── PHASE 4: VM EXECUTION ──
  setTab('trace');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('tab-trace').classList.add('active');
  clearTerm();
  setSbStatus('executing on VM…');
  setPipe('vm', 'active');
  setProgress(62);

  appendLine(`<span class="term-prompt">$</span> <span class="term-cmd">./cvm --trace ${prog.name}</span>`);
  await sleep(ms() * 0.6);
  appendLine(`<span class="term-section">── VM EXECUTION TRACE ───────────────</span>`);
  await sleep(ms() * 0.3);

  for (let i = 0; i < prog.trace.length; i++) {
    const step = prog.trace[i];
    if (!running) return;

    // update right panel
    setIP(step.ip, step.op);
    renderStack(step.sa);
    renderGlobals(step.g);
    highlightSrc(step.src);

    // stack before
    const stackStr = step.sb.length
      ? step.sb.map(s => `[ ${s.v} ]`).join(' ')
      : '[  ]';
    appendLine(`  <span class="term-stack">stack: ${stackStr}</span>`);

    // instruction
    const col = opColor(step.op);
    appendLine(`  <span class="term-addr">${step.ip}</span>  <span style="color:${col};font-weight:700">${step.op}</span>`);

    // print output
    if (step.out !== undefined) {
      appendLine(`  <span class="term-output">  → ${step.out}</span>`);
    }

    setProgress(62 + (i / prog.trace.length) * 30);
    term.scrollTop = term.scrollHeight;
    await sleep(ms() * 0.55);
  }

  setPipe('vm', 'done');
  setProgress(95);
  await sleep(ms() * 0.4);

  // ── PHASE 5: FINAL OUTPUT ──
  setTab('output');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $('tab-output').classList.add('active');
  clearTerm();
  highlightSrc(null);
  setSbStatus('program complete');

  appendLine(`<span class="term-prompt">$</span> <span class="term-cmd">./cvm ${prog.name}</span>`);
  await sleep(ms() * 0.5);
  appendLine(`<span class="term-section">── OUTPUT ───────────────────────────</span>`);
  await sleep(ms() * 0.3);

  for (const line of prog.output) {
    appendLine(`  <span class="term-output">${line}</span>`);
    await sleep(ms() * 0.4);
    if (!running) return;
  }

  await sleep(ms() * 0.5);
  appendLine(`<span style="color:var(--green);font-size:11px">  [process exited with code 0]</span>`);
  appendLine(`  <span class="cursor-blink"></span>`);
  setProgress(100);
  setSbStatus('done ✓', false);
  setIP('0xFFFF', 'OP_RETURN');

  running = false;
  $('run-btn').disabled = false;
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
$('prog-select').addEventListener('change', () => {
  if (running) return;
  prog = PROGRAMS[$('prog-select').value];
  renderSource();
  clearTerm();
  resetVM();
  resetPipes();
  setSbStatus('ready', false);
});

$('run-btn').addEventListener('click', runDemo);

// boot
renderSource();
resetVM();
setSbStatus('ready', false);
appendLine(`<span style="color:var(--muted);font-size:11px">CVM++ v0.1 — select a program and press ▶ Run</span>`);
appendLine(`<span class="cursor-blink"></span>`);
</script>
</body>
</html>
